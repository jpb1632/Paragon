<body>
  <iframe
    id="app-frame"
    class="app-frame"
    title="회천중앙역 파라곤"
    src="./static/%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8/%EB%B6%80%EB%8F%99%EC%82%B0%20(oLWSmCRkmlw6kEpt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt).html"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen
  ></iframe>
  <script>
    (function () {
      const blockGuardShortcut = (event) => {
        const key = String(event.key || "").toLowerCase();
        const ctrlOrMeta = event.ctrlKey || event.metaKey;
        const blockedDevToolShortcut =
          event.key === "F12" ||
          (ctrlOrMeta && event.shiftKey && ["i", "j", "c"].includes(key));

        if (blockedDevToolShortcut || (ctrlOrMeta && (key === "u" || key === "s"))) {
          event.preventDefault();
          event.stopPropagation();
        }
      };

      window.addEventListener("keydown", blockGuardShortcut, { capture: true });
      document.addEventListener("keydown", blockGuardShortcut, { capture: true });

      const baseSrc = "./static/%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8/%EB%B6%80%EB%8F%99%EC%82%B0%20(oLWSmCRkmlw6kEpt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt)/%EC%B2%AB%ED%8E%98%EC%9D%B4%EC%A7%80%20(AdKpMlw6KePt).html";
      const frame = document.getElementById("app-frame");
      if (!frame) return;

      const isConsultationRequest = () => {
        const params = new URLSearchParams(window.location.search);
        return window.location.hash === "#consultation" || params.get("consultation") === "1";
      };

      const clearConsultationState = () => {
        try {
          history.replaceState(null, "", window.location.pathname);
        } catch (_) {}
      };

      const requestFrameConsultationScroll = () => {
        try {
          if (!frame.contentWindow) return;
          frame.contentWindow.postMessage({ type: "consultation-scroll" }, "*");
        } catch (_) {}
      };

      const syncFrameRoute = () => {
        const consultation = isConsultationRequest();
        const nextSrc = consultation ? `${baseSrc}?consultation=1` : baseSrc;

        if (frame.getAttribute("src") !== nextSrc) {
          frame.setAttribute("src", nextSrc);
        } else if (consultation) {
          requestFrameConsultationScroll();
          window.setTimeout(clearConsultationState, 800);
        }
      };

      frame.addEventListener("load", () => {
        if (!isConsultationRequest()) return;
        requestFrameConsultationScroll();
        window.setTimeout(clearConsultationState, 800);
      });

      syncFrameRoute();
      window.addEventListener("hashchange", syncFrameRoute);
      window.addEventListener("popstate", syncFrameRoute);
    })();
  </script>
